name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Configure npm authentication
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish n8n-nodes-onepage
        run: npm publish --provenance --access public

      - name: Publish @rjsebening/n8n-nodes-onepage
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"

          cp -R dist "${publish_dir}/dist"
          cp README.md LICENSE package.json "${publish_dir}/"

          npm pkg set --prefix "${publish_dir}" name="@rjsebening/n8n-nodes-onepage"
          npm publish "${publish_dir}" --provenance --access public
